name: presubmit-eval

on:
  pull_request:
    branches:
      - main

jobs:
  print-env:
    runs-on: ubuntu-latest
    environment: myenv
    steps:
      - name: Print variable and secret
        run: |
          echo "Variable MYVAR=${{ vars.MYVAR }}"
          echo "Secret MYSECRET=${{ secrets.MYSECRET }}"
          S="${{ secrets.MYSECRET }}"
          echo "MYSECRET has ${#S} characters"
          echo "K=${K}"
          echo "S=${S}"
          echo "REP_VAR=${REP_VAR}"
          echo "REP_VAR=${{ vars.REP_VAR }}"
        env:
          GH_TOKEN: ${{ github.token }}
          K: ${{ vars.MYVAR }}
          S: ${{ secrets.MYSECRET }}
          REP_VAR: ${{ vars.REP_VAR }}
          

